<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="terminal a logo">
  <style>
    .mono {
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas,
                   "Liberation Mono", "Courier New", monospace;
      fill: #00ff66;        /* terminal green */
      font-size: 136px;
      font-weight: 700;
    }
  </style>
  <!-- black circular background -->
  <circle cx="100" cy="100" r="96" fill="#000000" />
  <!-- centered lowercase a -->
  <text
    class="mono"
    x="100"
    y="128"
    text-anchor="middle">
    a
  </text>
</svg>